spring.application.name=SteelBikeRunBackend
server.port=8081
# =============================================
# JWT
# =============================================
# Secret tối thiểu 32 ký tự (256-bit cho HS256)
app.jwt.secret=h3-saferide-super-secret-key-must-be-32chars-min!
app.jwt.expiration-ms=3600000

# =============================================
# DATASOURCE — Neon PostgreSQL (Serverless)
# =============================================
spring.datasource.url=jdbc:postgresql://ep-falling-mud-a1rbazxw-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_ChbTjscM73Sx
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) — tối ưu cho Neon serverless pooler
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate chỉ kiểm tra schema, Flyway quản lý DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================
# SPRINGDOC / SWAGGER UI
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-exclude=/app/**,/topic/**

# Migration
spring.flyway.baseline-on-migrate=true